<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      width: 380px; 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
      padding: 15px;
    }
    .header {
      text-align: center;
      padding-bottom: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 15px;
    }
    .header h1 {
      font-size: 1.3em;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .repo-name {
      font-size: 1.1em;
      color: #60a5fa;
      margin: 10px 0;
      text-align: center;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 15px 0;
    }
    .stat-card {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 12px 8px;
      text-align: center;
    }
    .stat-value { font-size: 1.2em; font-weight: bold; color: #60a5fa; }
    .stat-label { font-size: 0.75em; color: #9ca3af; margin-top: 3px; }
    .health-bar {
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      margin: 10px 0;
      overflow: hidden;
    }
    .health-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s;
    }
    .health-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8em;
      color: #9ca3af;
    }
    .section { margin: 12px 0; }
    .section-title {
      font-size: 0.85em;
      color: #9ca3af;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .lang-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
      font-size: 0.85em;
    }
    .lang-name { width: 80px; }
    .lang-pct { color: #9ca3af; }
    .bar-container {
      flex: 1;
      height: 8px;
      background: rgba(255,255,255,0.1);
      border-radius: 4px;
      overflow: hidden;
    }
    .bar-fill { height: 100%; border-radius: 4px; }
    .contributors {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .contributor {
      background: rgba(255,255,255,0.1);
      padding: 4px 10px;
      border-radius: 12px;
      font-size: 0.8em;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .contributor img {
      width: 16px;
      height: 16px;
      border-radius: 50%;
    }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 0.95em;
      cursor: pointer;
      margin-top: 15px;
      transition: transform 0.2s, opacity 0.2s;
    }
    .btn:hover { transform: scale(1.02); }
    .btn-primary {
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      color: #000;
      font-weight: bold;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .loading {
      text-align: center;
      padding: 40px 0;
      color: #9ca3af;
    }
    .error {
      color: #ef4444;
      text-align: center;
      padding: 20px;
    }
    .desc {
      font-size: 0.8em;
      color: #9ca3af;
      text-align: center;
      margin-top: 10px;
    }
    .desc a { color: #60a5fa; text-decoration: none; }
    .desc a:hover { text-decoration: underline; }
    .info-row {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 10px 0;
      font-size: 0.8em;
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="header">
  <h1>Repo Analyzer</h1>
  </div>
  
  <div id="content">
    <div class="loading">Loading...</div>
  </div>
  
  <button id="openBtn" class="btn btn-primary" style="display:none">
    Open on GitHub
  </button>
  <p class="desc"><a href="https://github.com/Ares16x16" target="_blank">@Ares16x16</a></p>

  <script src="popup.js"></script>
</body>
</html>
